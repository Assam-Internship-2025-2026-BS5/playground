name: Security Scan

on:
  push:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4


      # Install jq (used to format tables)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq


      # Start SonarQube server
      - name: Start SonarQube
        run: |
          docker run -d --name sonarqube -p 9000:9000 sonarqube:lts-community
          sleep 60


      # Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17


      # Install SonarScanner
      - name: Install SonarScanner
        run: |
          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-5.0.1.3006-linux.zip
          unzip sonar-scanner-cli-5.0.1.3006-linux.zip
          sudo mv sonar-scanner-5.0.1.3006-linux /opt/sonar-scanner
          echo "/opt/sonar-scanner/bin" >> $GITHUB_PATH


      # Run Sonar Scan
      - name: Run SonarQube Scan
        run: |
          sonar-scanner \
          -Dsonar.projectKey=flutter-security \
          -Dsonar.sources=lib \
          -Dsonar.host.url=http://localhost:9000 \
          -Dsonar.login=admin \
          -Dsonar.password=admin


      # Print Sonar Results
      - name: Print SonarQube Results
        run: |
          echo "==============================="
          echo " SONARQUBE SECURITY REPORT "
          echo "==============================="

          curl -s "http://localhost:9000/api/measures/component?component=flutter-security&metricKeys=bugs,vulnerabilities,code_smells,coverage" \
          -u admin:admin | jq -r '
          .component.measures[] |
          "| " + .metric + " | " + .value + " |"'


      # Install Gitleaks
      - name: Install Gitleaks
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH


      # Run Gitleaks JSON Scan
      - name: Run Gitleaks Scan
        run: |
          gitleaks detect \
          --source . \
          --report-format json \
          --report-path gitleaks-report.json || true


      # Print Gitleaks Results
      - name: Print Gitleaks Table
        run: |
          echo "==============================="
          echo " GITLEAKS SECRET REPORT "
          echo "==============================="

          if [ -s gitleaks-report.json ]; then
            jq -r '.[] | "| " + .RuleID + " | " + .File + " | line " + (.StartLine|tostring) + " |"' gitleaks-report.json
          else
            echo "| No secrets detected |"
          fi


      # Trivy filesystem scan JSON
      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: 0


      # Print Trivy Results with CVSS
      - name: Print Trivy Vulnerability Table
        run: |
          echo "==============================="
          echo " TRIVY VULNERABILITY REPORT "
          echo "==============================="

          jq -r '
          .Results[].Vulnerabilities[]? |
          "| " + .PkgName +
          " | " + .VulnerabilityID +
          " | " + .Severity +
          " | CVSS: " + (.CVSS.nvd.V3Score|tostring) +
          " |"' trivy-report.json


      # Upload reports
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            gitleaks-report.json
            trivy-report.json