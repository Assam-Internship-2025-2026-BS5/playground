name: Deploy Flutter Web to AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      # Checkout playground repo (default)
      - name: Checkout playground repository
        uses: actions/checkout@v3

      # Checkout designkit repo as a sibling directory
      - name: Checkout designkit repository
        uses: actions/checkout@v3
        with:
          repository: Assam-Internship-2025-2026-BS5/designkit
          path: ../designkit

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker Image
        run: docker build -t hdfc-playground .

      - name: Tag Docker Image
        run: docker tag hdfc-playground:latest ${{ steps.login-ecr.outputs.registry }}/hdfc-playground:latest

      - name: Push Docker Image
        run: docker push ${{ steps.login-ecr.outputs.registry }}/hdfc-playground:latest