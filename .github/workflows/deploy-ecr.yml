name: Build and Push to ECR

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: hdfc-playground

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Install GitLeaks (CLI version - no license needed)
      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks-linux-amd64.tar.gz
          tar -xzf gitleaks-linux-amd64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      # 3️⃣ Run GitLeaks secret scan
      - name: Run Gitleaks Scan
        run: |
          gitleaks detect --source . --verbose

      # 4️⃣ Filesystem vulnerability scan using Trivy
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

      # 5️⃣ Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 6️⃣ Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 7️⃣ Build Flutter Web
      - name: Build Flutter Web
        run: flutter build web

      # 8️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 9️⃣ Login to ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 🔟 Build Docker image
      - name: Build Docker Image
        run: docker build -t hdfc-playground .

      # 1️⃣1️⃣ Scan Docker image using Trivy
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: hdfc-playground:latest
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

      # 1️⃣2️⃣ Tag Docker image
      - name: Tag Docker Image
        run: |
          docker tag hdfc-playground:latest ${{ steps.login-ecr.outputs.registry }}/hdfc-playground:latest

      # 1️⃣3️⃣ Push Docker image to ECR
      - name: Push Docker Image to ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/hdfc-playground:latest