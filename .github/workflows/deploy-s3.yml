name: Deploy Flutter Web to S3

on:
  push:
    branches:
      - main

jobs:

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Gitleaks
        run: |
          go install github.com/zricethezav/gitleaks/v8@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run Gitleaks Scan (Logs)
        run: |
          gitleaks detect --source . --verbose || true

      - name: Generate Gitleaks Report
        run: |
          gitleaks detect \
          --source . \
          --report-format json \
          --report-path gitleaks-report.json || true

      - name: Trivy Filesystem Scan (Logs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Trivy Filesystem Report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          format: json
          output: trivy-fs-report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            gitleaks-report.json
            trivy-fs-report.json


  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Cache Flutter dependencies
      - name: Cache Flutter Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: flutter build web

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync build/web s3://${{ secrets.S3_BUCKET }} --delete