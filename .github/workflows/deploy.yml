name: Deploy Flutter Web to AWS

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

      # Checkout playground repo
      - name: Checkout Playground
        uses: actions/checkout@v3
        with:
          repository: Assam-Internship-2025-2026-BS5/playground
          path: playground
          ref: main

      # Checkout designkit repo
      - name: Checkout DesignKit
        uses: actions/checkout@v3
        with:
          repository: Assam-Internship-2025-2026-BS5/designkit
          path: designkit
          ref: main

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # Install dependencies
      - name: Install Flutter dependencies
        run: |
          cd playground
          flutter pub get

      # Build Flutter Web
      - name: Build Flutter Web
        run: |
          cd playground
          flutter build web

      # Configure AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Login to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t hdfc-playground ./playground

      # Tag Docker Image
      - name: Tag Docker Image
        run: |
          docker tag hdfc-playground:latest ${{ steps.login-ecr.outputs.registry }}/hdfc-playground:latest

      # Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/hdfc-playground:latest